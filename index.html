<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Poker Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ローディングオーバーレイ：init()完了まで表示 -->
  <div class="loading-overlay" id="loadingOverlay">Loading...</div>

  <!-- ヘッダー：アプリタイトル / ハンド番号 / BTN席 / 同期ドット -->
  <header>
    <h1>♠ Poker Tracker</h1>
    <div class="hand-counter">
      <div id="handNumLabel">HAND —<span class="sync-dot" id="syncDot"></span></div>
      <div id="btnSeatLabel">BTN: —</div>
    </div>
  </header>

  <!-- タブナビゲーション -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('record')">テーブル</div>
    <div class="tab" onclick="switchTab('stats')">統計</div>
    <div class="tab" onclick="switchTab('history')">履歴</div>
    <div class="tab" onclick="switchTab('players')">選手</div>
  </div>

  <!-- フラッシュメッセージ：記録完了・エラー通知 -->
  <div id="flash" class="flash">記録しました</div>

  <!-- ===== テーブルページ ===== -->
  <div class="page active" id="page-record">
    <!-- 席1〜9のリスト（JS側 renderTable() で動的生成） -->
    <div class="seat-list" id="seatList"></div>

    <!-- 下部固定バー -->
    <div class="bottom-bar">
      <!-- BTNを手動で1席進める -->
      <button class="btn-move-btn" onclick="moveBtnManual()">BTN移動</button>
      <button class="tbl-clear-btn" onclick="clearAllTable()">CLEAR</button>
      <!-- ハンドを確定してSheetsに送信 / BTNを自動で次の席へ -->
      <button class="next-hand-btn" id="nextHandBtn" onclick="commitHand()">NEXT HAND →</button>
    </div>
  </div>

  <!-- ===== 統計ページ ===== -->
  <div class="page" id="page-stats">
    <label class="field-label">プレイヤー絞り込み</label>
    <select id="statsPlayer" onchange="renderStats()">
      <option value="all">全プレイヤー</option>
    </select>
    <!-- 統計カード（JS側 renderStats() で動的生成） -->
    <div id="statsContainer"></div>
  </div>

  <!-- ===== 履歴ページ ===== -->
  <div class="page" id="page-history">
    <div class="section-title">最新の記録</div>
    <!-- 直近60件（JS側 renderHistory() で動的生成） -->
    <div id="historyContainer"></div>
  </div>

  <!-- ===== 選手管理ページ ===== -->
  <div class="page" id="page-players">
    <div class="add-player-form">
      <input type="text" id="newPlayerName" placeholder="プレイヤー名を入力" maxlength="20">
      <button class="add-btn" id="addPlayerBtn" onclick="addPlayer()">追加</button>
    </div>
    <div class="section-title">登録済みプレイヤー</div>
    <!-- プレイヤーリスト（JS側 renderPlayerList() で動的生成） -->
    <div id="playerListContainer"></div>
  </div>

  <!-- ===== 席割り当てモーダル ===== -->
  <!-- 席をタップすると表示。プレイヤーを選択して割り当て -->
  <div class="modal-overlay" id="assignModal">
    <div class="modal-sheet">
      <div class="modal-title" id="modalTitle">席にプレイヤーを割り当て</div>
      <!-- モーダル内プレイヤーリスト（JS側 openAssignModal() で動的生成） -->
      <div id="modalPlayerList"></div>
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>

  <!-- ===== プレイヤー編集モーダル ===== -->
  <div class="modal-overlay" id="editPlayerModal">
    <div class="modal-sheet">
      <div class="modal-title">プレイヤー編集</div>
      <input type="hidden" id="editPlayerId">
      <label class="field-label">名前</label>
      <input type="text" id="editPlayerName" maxlength="20" placeholder="プレイヤー名">
      <label class="field-label">メモ</label>
      <textarea id="editPlayerMemo" class="memo-textarea" placeholder="プレイスタイルのメモなど" maxlength="200"></textarea>
      <button class="modal-save-btn" onclick="saveEditPlayer()">保存</button>
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>

  <!-- ===== ハンド修正モーダル ===== -->
  <div class="modal-overlay" id="editHandModal">
    <div class="modal-sheet">
      <div class="modal-title" id="editHandTitle">ハンド修正</div>
      <input type="hidden" id="editHandId">
      <div class="section-title" style="margin-bottom:10px">フラグを修正</div>
      <!-- フラグチェックボックス（JS側 openEditHandModal() で動的生成） -->
      <div id="editHandFlags" class="edit-flag-grid"></div>
      <button class="modal-save-btn" onclick="saveEditHand()">保存</button>
      <button class="modal-delete-btn" onclick="deleteHand()">このハンドを削除</button>
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
